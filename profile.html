<style>
/* --- BASE REFINEMENTS --- */
body {
    margin: 0;
    font-family: 'Quicksand', sans-serif;
    color: #fff;
    
    overflow: auto;
}

a {
    text-decoration: none;
    color: inherit;
}

.nav {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 20px 60px;
  display: flex;
  justify-content: space-between;
  z-index: 20;
}

.nav a{
  display: inline-block; 
  position: relative;
  margin-left: 25px;
  cursor: pointer;

  color: #fff;
  opacity: 0.85;
  font-weight: 600;

  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.25s ease;
}

/* HOVER EFFECT */
.nav a:hover{
  opacity: 1;
  transform: translateY(-3px);
}


.nav a.profile-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 2px solid rgba(255, 177, 59, 0.6);
    background: rgba(255, 255, 255, 0.1);
}

/* --- PROFILE PAGE LAYOUT --- */
/* --- FIXED BACKGROUND LOGIC --- */
.profile-page {
    min-height: 100vh;
    /* We move the gradient to a fixed position so it doesn't stretch with content */
    background: 
        linear-gradient(to bottom, rgba(223, 169, 30, 0.6), rgba(150, 0, 0, 0.8)), 
        url("images/bg-mango.jpg") center/cover no-repeat fixed;
    
    background-attachment: fixed; /* Crucial: Keeps the color from moving when you scroll */
    padding: 130px 8% 60px;
    display: flex;
    gap: 30px;
    box-sizing: border-box;
}

/* --- PREVENT DARK-STACKING --- */
/* --- FIX: BRIGHTER CONTENT AREA --- */
.profile-content {
      position: relative;
    z-index: 2;
    flex: 1;
    min-width: 0;
    /* Increased opacity from 0.1 to 0.2 for better brightness */
    background: rgba(255, 255, 255, 0.2); 
    
    /* Keep blur but ensure it doesn't conflict with cards */
   backdrop-filter: none;
    -webkit-backdrop-filter: none;
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 30px;
    padding: 30px; /* Increased padding */
}

/* Fix the header so it isn't "dull" */
.section h2 { 
   z-index: 2;
    color: #ffffff !important;
    text-shadow: 0 4px 10px rgba(0,0,0,0.2);
    -webkit-text-fill-color: initial !important;
    background: none !important;
}
/* --- CLEAN ORDER CARDS --- */
/* --- PROFESSIONAL WHITE ORDER CARDS --- */
.order-card {
    /* Forced solid white for maximum visibility */
    background: #ffffff !important;
    color: #1a1a1a !important; /* Deep black text for clarity */
    
    /* Remove all blur effects that cause 'fuzziness' */
    backdrop-filter: none !important;
    -webkit-backdrop-filter: none !important;
    
    opacity:1;
    filter:none;

    border: 1px solid #eee !important;
    border-radius: 24px;
    padding: 30px;
    margin-bottom: 30px;
    
    /* Soft shadow to make it 'pop' against the white background */
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05) !important;
    transition: transform 0.3s ease;
}
#orders {
    background: transparent;
    backdrop-filter: none !important;
    -webkit-backdrop-filter: none !important;
}

.order-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1) !important;
}
/* --- SIDEBAR (Elevated Glass) --- */
.profile-sidebar {
    z-index: 2;
    width: 280px;
    background: rgba(255, 255, 255, 0.07);
    
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 30px;
    padding: 40px 20px;
    height: fit-content;
    position: sticky;
    top: 130px;
    
    display: flex;
    flex-direction: column;
    align-items: center;
}
/* --- PROFESSIONAL PROFILE CARD --- */
.info-card {
    background: #ffffff !important;
    border-radius: 28px;
    padding: 35px;
    box-shadow: 0 15px 45px rgba(0,0,0,0.15);
    border: none !important;
    color: #1a1a1a !important;
}

.profile-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
}

.profile-label {
    display: block;
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #ffb13b; /* Mango Accent */
    margin-bottom: 6px;
}

.profile-main-text {
    font-size: 20px;
    font-weight: 800;
    color: #111;
}

.profile-divider {
    height: 1px;
    background: #f0f0f0;
    margin: 25px 0;
}

/* --- EDIT INPUT --- */
.profile-edit-input {
    display: none;
    background: #f8f9fa;
    border: 2px solid #ffb13b;
    color: #111;
    padding: 10px 15px;
    border-radius: 12px;
    font-family: 'Quicksand';
    font-size: 18px;
    font-weight: 700;
    width: 100%;
    outline: none;
}

/* --- BUTTONS --- */
.p-btn-edit {
    background: #000;
    color: #fff;
    border: none;
    padding: 10px 24px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: 0.2s;
}

.p-btn-save {
    background: #27ae60;
    color: #fff;
    border: none;
    padding: 10px 24px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
}

.p-btn-cancel {
    background: #f0f0f0;
    color: #666;
    border: none;
    padding: 10px 20px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
}

.verified-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 800;
    color: #27ae60;
    background: #e8f5e9;
    padding: 6px 14px;
    border-radius: 50px;
}
.avatar {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ffb13b, #f39c12);
    display: flex;
    align-items: center;

    font-size: 38px;
    font-weight: 800;
    margin-bottom: 20px;
    color: #000;

}

.user-name { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.user-email { font-size: 13px; opacity: 0.6; margin-bottom: 30px; }

.menu { width: 100%; }
.menu button {
    width: 100%;
    background: transparent;
    border: none;
    color: #fff;
    text-align: left;
    padding: 15px 18px;
    border-radius: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 8px;
    transition: 0.3s;
    display: flex;
    align-items: center;
    gap: 12px;
}

.menu button:hover, .menu button.active {

    color: #ffffff;
    transform: translateX(5px);
}

/* --- CONTENT AREA (Main Display) --- */


.section { display: none; animation: fadeIn 0.4s ease; }
.section.active { display: block; }

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }

/* --- ENHANCED ADDRESS CARDS --- */
.address-card {

.address-card:hover {

.address-contact {

.address-footer {

/* --- ACTION BUTTONS --- */
.action-btn {

.action-btn.edit {

}

/* --- FORMS & INPUTS --- */

}

input, select {

    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #fff;
    padding: 15px;
    border-radius: 12px;
    font-family: 'Quicksand';

}

input:focus {
    outline: none;
    border-color: #ffb13b;
    background: rgba(255, 255, 255, 0.12);
}

/* --- BUTTONS --- */
.save-btn {
    background: #ffb13b;
    color: #000;
    padding: 14px 30px;
    border-radius: 15px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    transition: 0.3s;
    text-transform: uppercase;
    font-size: 13px;
    letter-spacing: 0.5px;
}

.save-btn:hover {
    transform: scale(1.03);
    box-shadow: 0 10px 20px rgba(255, 177, 59, 0.3);
}

.logout-btn { 
    background: #ff4d4d !important; 
    color: #fff !important; 
}

.default-badge {
    background: #ff623b;
    color: #000;
    padding: 4px 12px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 800;
}

/* --- MOBILE RESPONSIVE --- */
@media (max-width: 768px) {
    .nav { padding: 15px 25px; }
    .logo { font-size: 24px; }
    
  /* PROFILE PAGE */

    padding:100px 15px 40px;
    gap:20px;
  }

  /* SIDEBAR */
  .profile-sidebar{
    width:100%;
    position:relative;
    top:0;
    padding:25px 15px;
  }

  .avatar{
    width:80px;

    font-size:28px;
  }

  .user-name{
    font-size:18px;
  }

  }

  /* MENU */
  .menu{
    display:flex;
    overflow-x:auto;
    gap:10px;
    padding-bottom:10px;
  }

  .menu button{
    white-space:nowrap;
    width:auto;
    padding:10px 18px;
    font-size:14px;
  }

  /* CONTENT AREA */
  .profile-content{
    padding:20px;
  }

  .section h2{
    font-size:22px;
  }

  /* ORDER CARD */
  .order-card{
    padding:20px;
  }

  .order-card img{
    width:55px !important;
  }

  /* ORDER IMAGE BLOCK */
  .order-card div[style*="width: 90px"]{
    width:70px !important;
    height:70px !important;
  }

  /* TOTAL AMOUNT BOX */
  .order-card span[style*="font-size: 32px"]{
    font-size:24px !important;
  }

  /* BUTTONS */
  .save-btn{
    padding:12px 20px;
    font-size:12px;
  }

  /* ADDRESS FORM */
  #addressForm{
    padding:20px;
  }

  #addressForm input,
  #addressForm select{
    padding:12px;
  }

}
</style>

<script type="module">
/* 🔹 FIREBASE IMPORTS */
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { 
  doc, getDoc, setDoc, updateDoc, collection, 
  getDocs, addDoc, deleteDoc, serverTimestamp, query, orderBy 
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

/* 🔐 GLOBAL STATE */
let currentUser = null;
let addresses = [];

/* 🔐 AUTH CHECK & DATA INITIALIZATION */
onAuthStateChanged(window.auth, async (user) => {
  if (!user) {
    localStorage.removeItem("frutiqUserCache");
    window.location.href = "index.html";
    return;
  }

  currentUser = user;

  try {
    // 1. Load Profile
    const userRef = doc(window.db, "users", user.uid);
    let snap = await getDoc(userRef);

    if (!snap.exists()) {
      await setDoc(userRef, {
        email: user.email,
        name: "New User",
        createdAt: serverTimestamp()
      });
      snap = await getDoc(userRef);
    }

    const data = snap.data();
    renderProfileUI(data);
    
    // 2. Load Data from Cloud (Wait for both to finish)
    await window.loadAddresses(); 
    await window.loadOrders(); 
    
    // 3. Update Local Cache for the Shop/Order page
    cacheUserProfile(user, data);

  } catch (err) {
    console.error("Initialization Error:", err);
  }
});

function renderProfileUI(data) {
  document.getElementById("userName").innerText = data.name || "User";
  document.getElementById("userEmail").innerText = data.email || "";
  document.getElementById("pName").innerText = data.name || "Not set";
  document.getElementById("pEmail").innerText = data.email || "";
  const initial = (data.name || "U")[0].toUpperCase();
  document.getElementById("avatar").innerText = initial;
}
// 1. Toggle between showing name and showing the input box
window.toggleNameEdit = (isEditing) => {
    const nameSpan = document.getElementById("pName");
    const nameInput = document.getElementById("editNameInput");
    const editBtn = document.getElementById("editBtn");
    const saveBtn = document.getElementById("saveBtn");
    const cancelBtn = document.getElementById("cancelBtn"); // Added for professional UX

    if (isEditing) {
        // Sync values and show input
        nameInput.value = nameSpan.innerText;
        
        nameSpan.style.display = "none";
        nameInput.style.display = "block"; // Use block to match the new CSS layout
        
        // Handle Button States
        editBtn.style.display = "none";
        saveBtn.style.display = "inline-block";
        if (cancelBtn) cancelBtn.style.display = "inline-block";
        
        // Auto-focus the input for a better user experience
        nameInput.focus();
    } else {
        // Return to viewing state
        nameSpan.style.display = "block";
        nameInput.style.display = "none";
        
        // Reset Button States
        editBtn.style.display = "inline-block";
        saveBtn.style.display = "none";
        if (cancelBtn) cancelBtn.style.display = "none";
    }
};
// 2. Save the new name to Firestore
window.saveNewName = async () => {

/* 📂 OPEN FORM */
window.openAddressForm = function() {
  const form = document.getElementById("addressForm");
  const saveBtn = document.querySelector("#addressForm .save-btn");
  
  // If we aren't editing, clear the fields
  if (!window.editingAddressId) {
    document.getElementById("aName").value = "";
    document.getElementById("aPhone").value = "";
    document.getElementById("aHouse").value = "";
    document.getElementById("aStreet").value = "";
    document.getElementById("aCity").value = "";
    document.getElementById("aState").value = "";
    document.getElementById("aPincode").value = "";
    document.getElementById("aType").value = "Home";
    if (saveBtn) saveBtn.innerText = "Save Address";
  }

  form.style.display = "block";
};

/* ❌ CLOSE FORM */
window.closeAddressForm = function() {
  document.getElementById("addressForm").style.display = "none";
  window.editingAddressId = null; // 🚩 ALWAYS reset this so the next "Add" isn't an "Edit"
};
window.editAddress = function(id) {
  // 1. Find the address in our local array
  const addr = addresses.find(item => item.id === id);
  if (!addr) return;

  // 2. Set the global editing ID (you need to define this at the top of your script)
  window.editingAddressId = id;

  // 3. Fill the form fields
  document.getElementById("aName").value = addr.name || "";
  document.getElementById("aPhone").value = addr.phone || "";
  document.getElementById("aHouse").value = addr.house || "";
  document.getElementById("aStreet").value = addr.street || "";
  document.getElementById("aCity").value = addr.city || "";
  document.getElementById("aState").value = addr.state || "";
  document.getElementById("aPincode").value = addr.pincode || "";
  document.getElementById("aType").value = addr.type || "Home";

  // 4. Open the form and change button text
  openAddressForm(); 
  const saveBtn = document.querySelector("#addressForm .save-btn");
  if (saveBtn) saveBtn.innerText = "Update Address";
};
/* ➕ SAVE OR UPDATE ADDRESS */
window.saveAddress = async function() {
  if (!currentUser) return;
  
  const data = {
    name: document.getElementById("aName").value,
    phone: document.getElementById("aPhone").value,
    house: document.getElementById("aHouse").value,
    street: document.getElementById("aStreet").value,
    city: document.getElementById("aCity").value,
    state: document.getElementById("aState").value,
    pincode: document.getElementById("aPincode").value,
    type: document.getElementById("aType").value,
  };

  if(!data.phone || !data.house) { alert("Please fill required fields!"); return; }

  try {
    const userAddrRef = collection(window.db, "users", currentUser.uid, "addresses");

    if (window.editingAddressId) {
      // ✏️ UPDATE EXISTING
      const docRef = doc(window.db, "users", currentUser.uid, "addresses", window.editingAddressId);
      await updateDoc(docRef, { ...data, updatedAt: serverTimestamp() });
      alert("Address Updated! ✅");
    } else {
      // ➕ ADD NEW
      data.isDefault = addresses.length === 0;
      data.createdAt = serverTimestamp();
      await addDoc(userAddrRef, data);
      alert("Address Saved! ✅");
    }

    window.closeAddressForm(); // This will also reset the ID via the fix below
    window.loadAddresses();
  } catch (e) { 
    alert("Error: " + e.message); 
  }
};

            list.innerHTML = "<p style='color:white; text-align:center; font-size: 18px; opacity:0.6;'>No orders yet.</p>";
            return;

window.copyOrderCoupon = function(code, btn){

  navigator.clipboard.writeText(code).then(()=>{

    const originalText = btn.innerText;

    btn.innerText = "Copied!";
    btn.style.background = "#27ae60";

    setTimeout(()=>{
      btn.innerText = originalText;
      btn.style.background = "#ffb13b";
    },1500);

  }).catch(()=>{
    alert("Copy failed");
  });

}
function getStatusClass(status) {
  const s = (status || "Order confirmed").toLowerCase();
  if (s === 'delivered') return 'status-delivered';
  if (s === 'cancelled') return 'status-cancelled';
  return 'status-pending';
}

window.deleteAddress = async function(id) {
  try {
    await deleteDoc(doc(window.db, "users", currentUser.uid, "addresses", id));
    window.loadAddresses();
  } catch(e) { alert("Delete failed"); }
};

window.setDefault = async function(id) {
  try {
    for (const a of addresses) {
      await updateDoc(doc(window.db, "users", currentUser.uid, "addresses", a.id), { isDefault: a.id === id });
    }
    window.loadAddresses();
  } catch(e) { alert("Update failed"); }
};

<script>
  (function waitForAddressSection() {
    if (window.location.hash !== "#address") return;

    const section = document.getElementById("address");

    if (section) {
      section.scrollIntoView({ behavior: "smooth", block: "start" });

      // Highlight effect
      section.style.boxShadow = "0 0 0 3px #ffb13b";
      section.style.transition = "box-shadow 0.3s ease";
      setTimeout(() => section.style.boxShadow = "", 2000);

    } else {
      // 🔁 Retry until Firebase finishes loading
      setTimeout(waitForAddressSection, 300);
    }
  })();
</script>
