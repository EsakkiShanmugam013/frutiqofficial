<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact – FRUTIQ</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
  <script>
    (function(){
      emailjs.init("jpGjOurUeXV1F3xfS"); 
    })();
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

  <style>
    /* --- MANGO THEME & CENTERED LAYOUT --- */
    :root {
      --mango: #ffb13b;
      --mango-dark: #e69a21;
      --dark-text: #2d3436;
    }

    .contact-page-wrapper {
      padding: 60px 10%;
      background-image:url("images/bg-mango.jpg");
      background-size: cover;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .contact-header {
      text-align: center;
      margin-bottom: 5px;
    }

    .contact-header h1 {
      font-size: 42px;
      font-weight: 800;
      color: var(--dark-text);
      margin-bottom: 10px;
    }

    .contact-container {
      display: flex;
      width: 100%;
      max-width: 1000px;
      background: #ffffff;
      border-radius: 30px;
      overflow: hidden;
      box-shadow: 0 25px 70px rgba(0,0,0,0.1);
      border: 1px solid #eee;
    }

    /* Left Side: Centered Info */
    .contact-info-panel {
      flex: 1;
      background: var(--mango);
      color: white;
      padding: 50px;
      display: flex;
      flex-direction: column;
      justify-content: center; /* Vertical Center */
      align-items: center;     /* Horizontal Center */
      text-align: center;      /* Center Text */
    }

    .contact-info-panel h2 {
      font-size: 32px;
      margin-bottom: 20px;
      font-weight: 800;
    }

    .info-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 25px;
    }

    .info-row {
      display: flex;
      flex-direction: column; /* Stacked for a centered look */
      align-items: center;
      gap: 8px;
    }

    .info-row .icon-box {
      background: rgba(255, 255, 255, 0.25);
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%; /* Circular icons */
      font-size: 22px;
      margin-bottom: 5px;
    }

    .info-row p { margin: 0; }
    /* Social Media Section */
     .social-links {
  margin-top: 40px;
  display: flex;
  gap: 25px;
  border-top: 1px solid rgba(255, 255, 255, 0.3);
  padding-top: 30px;
  justify-content: center;
}

.social-icon {
  color: white;
  font-size: 24px; /* Adjust size of icons */
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  text-decoration: none;
}

.social-icon:hover {
  color: var(--dark-text);
  transform: translateY(-5px) scale(1.1);
}

/* Specific hover colors if you want to be extra fancy */
.social-icon[title="Instagram"]:hover { color: #E1306C; }
.social-icon[title="Facebook"]:hover { color: #1877F2; }
.social-icon[title="Twitter/X"]:hover { color: #000000; }

/* Ensure info-panel still looks good on small screens */
@media (max-width: 768px) {
  .social-links {
    margin-top: 25px;
    padding-top: 20px;
    width: 100%;
  }
}

    /* Right Side: Form */
    .contact-form-panel {
      flex: 1.3;
      padding: 50px;
    }

    .form-group { margin-bottom: 20px; }

    .form-group label {
      display: block;
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 8px;
      color: var(--dark-text);
    }

    .form-group input, 
    .form-group textarea {
      width: 100%;
      padding: 14px;
      border: 2px solid #f1f1f1;
      border-radius: 12px;
      font-family: 'Quicksand', sans-serif;
      font-size: 15px;
      transition: all 0.3s;
    }

    .form-group input:focus, 
    .form-group textarea:focus {
      outline: none;
      border-color: var(--mango);
      background: #fffdf9;
    }

    .send-btn {
      width: 100%;
      padding: 16px;
      background: var(--mango);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
    }

    .send-btn:hover {
      background: var(--mango-dark);
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(255, 177, 59, 0.3);
    }

    @media (max-width: 850px) {
      .contact-container { flex-direction: column; }
    }
.nav a.profile-icon{
  display: inline-flex;          /* keeps SVG centered */
  align-items: center;
  justify-content: center;

  width: 34px;
  height: 34px;
  margin-left: 20px;

  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.9);

  /* IMPORTANT */
  transform: translateY(0);

  transition:
    transform 0.25s ease,
    border-color 0.25s ease,
    background-color 0.25s ease;
}
.nav a.profile-icon:hover{
  transform: translateY(-2px);   /* smaller than text */
  border-color: #ffb13b;
  background-color: rgba(255,255,255,0.08);
}
@media (max-width: 768px) {
  /* 1. GLOBAL RESET: Allow scrolling & hide horizontal leaks */
  html, body {
    overflow-x: hidden;
    overflow-y: auto !important;
    height: auto;
  }

 
  /* 3. WRAPPERS & CONTAINERS: Universal Padding */
  /* This prevents your content from hiding under the Nav */
  .contact-page-wrapper, 
  .about-hero, 
  .shop, 
  .profile-page,
  .contact-container {
    padding-top: 80px !important;
    padding-left: 15px !important;
    padding-right: 15px !important;
    width: 100% !important;
    display: flex !important;
    flex-direction: column !important;
    align-items: center !important;
  }

  /* 4. CONTENT FIX: Centering Text & Buttons */
  h1 { font-size: 28px !important; text-align: center; }
  p { font-size: 15px !important; text-align: center; width: 95%; }

  /* 5. BOXES & CARDS: Make them stackable */
  .contact-container, 
  .features-grid, 
  .products,
  .profile-page {
    flex-direction: column !important;
    gap: 20px !important;
  }

  .contact-info-panel, 
  .contact-form-panel, 
  .feature-card, 
  .product {
    width: 100% !important;
    max-width: 100% !important;
    border-radius: 20px !important;
    padding: 25px 20px !important;
  }

  /* 6. INPUTS: Fix iOS Zoom */
  input, textarea, select, button {
    font-size: 16px !important; 
    width: 100% !important;
  }
}
  </style>
</head>
<body>

  <div class="logo">FRUTIQ</div>
  <nav>

    </div>

    <div class="contact-form-panel">
      <form id="contact-form">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="user_name" placeholder="John Doe" required>
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="user_email" placeholder="john@example.com" required>
        </div>

        <div class="form-group">
          <label>Your Message</label>
          <textarea name="message" rows="5" placeholder="How can we help?" required></textarea>
        </div>

        <button type="submit" class="send-btn" id="submit-btn">Send Message</button>
      </form>
    </div>

  </section>
</main>

<script>
  const btn = document.getElementById('submit-btn');

  document.getElementById('contact-form').addEventListener('submit', function(event) {
    event.preventDefault();
    btn.innerText = 'Sending...';

    emailjs.sendForm('service_bbin6mo', 'template_bim1exm', this)
      .then(() => {
        btn.innerText = 'Send Message';
        alert('✅ Message Sent! We will get back to you soon.');
        this.reset();
      }, (err) => {
        btn.innerText = 'Send Message';
        alert('❌ Oops! Something went wrong.');
      });
  });
</script>
