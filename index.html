<!-- 🍹 FLAVOUR SCRIPT (UNCHANGED) -->
<script>
const flavours = {
  mango: {
    bg: "images/bg-mango.jpg",
    text: "MANGO",
    title: "Mango Rush",
    desc: "Tropical power. Instant energy.",
    can: "images/can-mango.png",
    slices: ["images/mango-1.png","images/mango-2.png","images/mango-3.png"],
    overlay: "rgba(255,180,60,0.55)"
  },
  apple: {
    bg: "images/bg-apple.jpg",
    text: "APPLE",
    title: "Apple Blast",
    desc: "Crisp energy. Fresh punch.",
    can: "images/can-apple.png",
    slices: ["images/apple-1.png","images/apple-2.png","images/apple-3.png"],
    overlay: "rgba(255,80,80,0.3)"
  },
  strawberry: {
    bg: "images/bg-strawberry.jpg",
    text: "BERRY",
    title: "Strawberry Spark",
    desc: "Berry bold. Charged taste.",
    can: "images/can-strawberry.png",
    slices: ["images/strawberry-1.png","images/strawberry-2.png","images/strawberry-3.png"],
    overlay: "rgba(255,100,160,0.35)"
  }
};

const order = ["mango","apple","strawberry"];
let index = 0;

function restart(el, cls) {
  el.classList.remove(cls);
  void el.offsetWidth;
  el.classList.add(cls);
}

function setFlavour(name) {
  index = order.indexOf(name);
  const f = flavours[name];

  const bgText = document.getElementById("bgText");
  const can = document.getElementById("mainCan");
  const l = document.getElementById("sliceLeft");
  const t = document.getElementById("sliceTop");
  const r = document.getElementById("sliceRight");

  document.getElementById("bg").style.backgroundImage = `url('${f.bg}')`;
  document.getElementById("overlay").style.background =
    `radial-gradient(circle at center, ${f.overlay}, transparent 70%)`;

  bgText.innerText = f.text;
  document.getElementById("title").innerText = f.title;
  document.getElementById("desc").innerText = f.desc;

  can.src = f.can;
  l.src = f.slices[0];
  t.src = f.slices[1];
  r.src = f.slices[2];

  restart(bgText,"animate-text");
  restart(can,"animate-can");
  restart(l,"animate-slice");
  restart(t,"animate-slice");
  restart(r,"animate-slice");
}

function nextFlavour() {
  index = (index + 1) % order.length;
  setFlavour(order[index]);
}

function prevFlavour() {
  index = (index - 1 + order.length) % order.length;
  setFlavour(order[index]);
}
// 🔁 AUTO SLIDE EVERY 5 SECONDS (NO MANUAL CHANGE)
setInterval(() => {
  nextFlavour();
}, 7000);

window.onload = () => setFlavour("mango");

</script>
<script type="module">
  /* 🔹 Firebase SDKs */
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    onAuthStateChanged,
    signOut,
    sendPasswordResetEmail
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import {
    getFirestore,
    doc,
    setDoc,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";

  /* 🔹 Firebase config */
  const firebaseConfig = {
    apiKey: "AIzaSyAXg7kp3po0wV2jcgoEbLUvOa2KWVyk2n0",
    authDomain: "frutiq-a7076.firebaseapp.com",
    projectId: "frutiq-a7076",
    storageBucket: "frutiq-a7076.appspot.com",
    messagingSenderId: "764361625616",
    appId: "1:764361625616:web:556d65ad2f17614d33ba95",
    measurementId: "G-Z6EKHYVHPC"
  };

  /* 🔥 Initialize Firebase FIRST */
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  getAnalytics(app);

  /* 🔹 UI helpers */
  window.showRegister = () => {
    loginSection.style.display = "none";
    registerSection.style.display = "flex";
  };

  window.showLogin = () => {
    registerSection.style.display = "none";
    loginSection.style.display = "flex";
  };
  /* 🍞 POP-UP HELPER */
  window.showToast = (message) => {
    const toast = document.getElementById("toast");
    toast.innerText = message;
    toast.classList.add("show");
    
    // Hide it automatically after 3.5 seconds
    setTimeout(() => {
      toast.classList.remove("show");
    }, 3500);
  };
   /* 📝 REGISTER */
  window.register = async () => {
  try {
    // 🚩 1. Tell the listener to IGNORE the next auth change
    window.isRegistering = true;

    const cred = await createUserWithEmailAndPassword(auth, regEmail.value, regPassword.value);
    
    await setDoc(doc(db, "users", cred.user.uid), {
      name: regName.value,
      email: regEmail.value,
      createdAt: serverTimestamp()
    });

    // 2. Clear session immediately
    await signOut(auth);

    // 🚩 3. Now that they are signed out, we can turn the flag off
    window.isRegistering = false;

    // Clear fields
    regName.value = "";
    regEmail.value = "";
    regPassword.value = "";

    showToast("Registered successfully ✅ Please log in.");
    showLogin();

  } catch (e) {
    window.isRegistering = false; // Reset flag if it fails
    registerMsg.innerText = e.message;
    registerMsg.style.color = "#ff5050";
  }
};

  /* 🔑 LOGIN */
  window.login = async () => {
    try {
      await signInWithEmailAndPassword(
        auth,
        loginEmail.value,
        loginPassword.value
      );
    } catch (e) {
      loginMsg.innerText = "Invalid credentials ❌";
    }
  };
   /* 🔁 THIS IS WHAT LOADS HOME PAGE */

  /* 🔁 UPDATED AUTH LISTENER */
onAuthStateChanged(auth, (user) => {
  // 🚩 IF WE ARE IN THE MIDDLE OF REGISTERING, DO NOTHING!
  if (window.isRegistering === true) {
    console.log("Registration in progress... ignoring auto-login.");
    return; 
  }

  const loginSec = document.getElementById("loginSection");
  const regSec = document.getElementById("registerSection");
  const homeSec = document.getElementById("homeSection");
  const loader = document.getElementById("globalLoader");

  if (user) {
    if (loginSec) loginSec.style.display = "none";
    if (regSec) regSec.style.display = "none";
    if (homeSec) homeSec.style.display = "block";
  } else {
    if (homeSec) homeSec.style.display = "none";
    if (regSec) regSec.style.display = "none";
    if (loginSec) loginSec.style.display = "flex";
  }

  if (loader) loader.style.display = "none";
});
  /* 🚪 LOGOUT */
  window.logout = async () => {
    await signOut(auth);
  };
</script>
